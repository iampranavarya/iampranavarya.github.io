name: Daily AI Entertainment Blog Post

on:
  schedule:
    # Checks in every hour from 06:00 to 21:00 UTC. The script itself decides
    # (via random selection) which one hourly check-in actually publishes, so
    # the real publish time is different and unpredictable every day, not a
    # fixed clock time like a typical bot.
    - cron: '0 6-21 * * *'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab to test

permissions:
  contents: write

concurrency:
  group: daily-blog-publish
  cancel-in-progress: false   # let a sleeping/in-progress run finish before the next check-in starts

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic google-genai Pillow

      - name: Generate today's post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python scripts/generate_post.py

      - name: Commit and push if there are changes
        run: |
          git config user.name "PAFP Blog Bot"
          git config user.email "actions@github.com"
          git add blog/ sitemap.xml
          git diff --staged --quiet || git commit -m "Auto-publish daily blog post $(date +'%Y-%m-%d')"
          git push
