<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pranav Arya | Select Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #050507;
      --gold: #c9a84c;
      --tech-blue: #60aaff;
      --white: #f0ece4;
      --font-display: 'Bebas Neue', sans-serif;
      --font-serif: 'Cormorant Garamond', serif;
      --font-mono: 'Space Mono', monospace;
    }
    
    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--font-serif);
      overflow: hidden; /* Prevents scrolling on the gateway page */
    }

    .split-layout {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    /* Common styles for both halves */
    .split {
      flex: 1; /* Both sides take up exactly half the screen */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      transition: flex 0.6s cubic-bezier(0.25, 1, 0.5, 1);
      position: relative;
      cursor: pointer;
    }

    /* The overlay that darkens the background */
    .split::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(5, 5, 7, 0.7);
      transition: opacity 0.6s ease, background 0.6s ease;
      z-index: 1;
    }

    /* Hover effect: The side expands */
    .split:hover { flex: 1.35; }
    .split:hover::before { opacity: 0; }

    /* FILM SIDE (Left) */
    .film-side {
      background: radial-gradient(circle at center, #1a1508 0%, var(--black) 100%);
      border-right: 1px solid rgba(201,168,76,0.1);
    }
    .film-side .sub-title { color: var(--gold); }
    .film-side:hover .title { transform: scale(1.05); text-shadow: 0 0 30px rgba(201,168,76,0.3); }
